<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siêu Xe Ferrari Của Tôi</title>
    <style>
        /* CSS RESET CƠ BẢN */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* CĂN GIỮA TOÀN BỘ TRANG */
        html,
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            background-color: #2c3e50;
            /* Màu nền tối để xe nổi bật */
        }

        /* CONTAINER XE CHÍNH - XỬ LÝ CHẠY */
        .car {
            height: fit-content;
            width: fit-content;
            position: relative;
            left: -300px;
            /* Bắt đầu ngoài màn hình một chút */
            animation: carRun 4s ease-in-out infinite alternate;
        }

        @keyframes carRun {
            from {
                transform: translateX(0px);
            }

            to {
                transform: translateX(800px);
                /* Chạy xa hơn */
            }
        }

        /* PHẦN MÁI VÀ KÍNH XE (GREENHOUSE) */
        .roof {
            display: flex;
            height: 45px;
            /* Thấp hơn */
            width: 180px;
            /* Dài hơn */
            background-color: #d32f2f;
            /* Màu đỏ Ferrari */
            transform: translateX(50px) translateY(5px);
            overflow: hidden;
            position: relative;
            /* Tạo hình mái xe thấp, dốc, khí động học */
            clip-path: polygon(0% 100%, 35% 0%, 90% 0%, 100% 100%);
        }

        /* HỆ THỐNG KÍNH LIỀN MẠCH */
        .glass-1,
        .glass-2 {
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            /* Tối hơn */
            position: absolute;
        }

        .glass-1 {
            width: 65%;
            /* Kính chắn gió chính */
            left: 0;
            /* Tạo độ dốc kính chắn gió */
            clip-path: polygon(0% 100%, 100% 0%, 100% 100%);
        }

        .glass-2 {
            width: 40%;
            /* Kính bên */
            left: 60%;
            /* Hình dạng cửa sổ bên */
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%);
        }

        /* THÂN XE CHÍNH */
        .car-body {
            height: 70px;
            /* Thấp hơn đáng kể */
            width: 280px;
            /* Dài hơn */
            background-color: #d32f2f;
            /* Đỏ Ferrari */
            display: flex;
            align-items: end;
            justify-content: space-evenly;
            position: relative;
            /* Tạo hình thân xe siêu xe với mũi nhọn và đuôi bè */
            clip-path: polygon(0% 100%, 10% 20%, 90% 10%, 100% 100%);
            padding-bottom: 2px;
            /* Đẩy bánh lên một chút */
        }

        /* HỐC BÁNH XE - GIỮ NGUYÊN CÁCH CĂN CỦA BẠN */
        .tire {
            height: 35px;
            /* Lớn hơn một chút */
            width: 65px;
            background-color: white;
            /* Hốc bánh */
            border-radius: 50% / 100% 100% 0 0;
            /* Bo cong hốc bánh */
            display: flex;
            justify-content: center;
            align-items: flex-end;
            /* Căn bánh sát đáy hốc */
        }

        /* BÁNH XE XOAY - TỐI ƯU HƠN */
        .wheel {
            height: 45px;
            width: 45px;
            position: relative;
            animation: tagRun 4s ease-in-out infinite alternate;
            transform-origin: center center;
        }

        /* TẠO RA BÁNH XE TĨNH ĐỂ XOAY CẢ KHỐI */
        .wheel::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                /* Tâm bánh xe */
                radial-gradient(circle, rgb(0, 0, 0) 15%, transparent 16%),
                /* Nan hoa mỏng kiểu siêu xe */
                repeating-conic-gradient(from 0deg, rgb(0, 0, 0) 0% 2%, transparent 2% 10%);
            border-radius: 50%;
            border: 5px solid #000000;
        }

        @keyframes tagRun {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
                /* Xoay 360 độ cho một vòng */
            }
        }
    </style>
</head>

<body>
    <div class="car">
        <div class="roof">
            <div class="glass-1"></div>
            <div class="glass-2"></div>
        </div>
        <div class="car-body">
            <div class="tire">
                <div class="wheel"></div>
            </div>
            <div class="tire">
                <div class="wheel"></div>
            </div>
        </div>
    </div>
</body>

</html>
