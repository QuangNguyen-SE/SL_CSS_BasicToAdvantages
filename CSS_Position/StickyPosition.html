    <title>Document</title>
    <style>
        body{
            background-color: aqua;
        }
        .menu-bar{
            position:sticky; 
            /* sticky position cần khai báo top để khi cuộn xuống tới bao nhiêu là cố định menu bar
                Luôn đi kèm với thuộc tính top
            */
            top:20px;
            width: 50%;
            height: 60px;
            border: 2px solid;
            border-radius:9999px;
            background-color: black;
            margin-top:20px;
            inset-inline: 0;
            margin: 0 auto;
            box-sizing: border-box;
        }
        .menu-title{
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-size: 20px;
            height: auto;
            width: fit-content;
            color: aqua;
            
        }

        .menu-list{
            display: flex;
            justify-content: space-around;
            list-style-type: none;
        }
        .menu-item a{
            color: white;
            text-decoration: none;
            font-size: large;
        }
        .menu-item a:hover{
            color:antiquewhite;
            font-size: larger;
        }
    </style>
</head>
<body>
    <div class="menu-bar">
