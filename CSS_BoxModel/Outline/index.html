<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .box {
        padding: 15px;
        margin: 25px;
        border: 1px solid lightgray;
        outline-width: 3px;
    }

    .solid {
        outline: solid #04AA6D;
    }

    .dashed {
        outline: 3px dashed red;
    }

    .offset{
        outline: 3px solid dimgray;
        outline-offset: 10px;
    }
</style>
</head>

<body>
    <!-- Outline là phần nằm giữa border và margin
        Nếu ko đụng chạm chỉnh sửa thì outline ko hề chiếm chỗ hay làm tăng diện tích 
    -->
    <!-- Outline bao gồm: style, width, color, offset(đặc biệt)-->

    <div class="box solid">Solid green outline (individual properties)</div>
    <div class="box dashed">Dashed red outline (shorthand)</div>
    <div class="box offset">Outline with 10px offset from border</div>

</body>

</html>
