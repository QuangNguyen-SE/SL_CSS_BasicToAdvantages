<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html, body{
            height: 100%;
            width: 100%;
        }

        .center-tag{
            border:1px solid;
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0px;
            position: relative;
            top:50%;
            left:50%;
            transform: translate(-50%, -50%);
        }
        .item{
            width: fit-content;
            height: fit-content;
        }
    </style>
</head>
<body>
    <div class="center-tag">
        <div class="item">Center-tag</div>
    </div>
</body>
</html>
