<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .pic-1{
            position: absolute;
            z-index: 1;
        }
        .pic-2{
            position: absolute;
            z-index: 0;
        }
        .pic-3{
            position: absolute;
            z-index:-1
        }
    </style>
</head>
<body>
    <h1>Z-index: là 1 trong những thuộc tính điều chỉnh item gần tầm mắt hơn</h1>
    <img src="picNumber/1.jpg" alt="" class="pic-1" width="300px">
    <img src="picNumber/2.jpg" alt="" class="pic-2" width="400px">
    <img src="picNumber/3.jpg" alt="" class="pic-3" width="500px">
</body>
</html>
