<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB-Color</title>
    <style>
        /*
            rgb là red-green-blue (value: 0-255)
        */
        h1{
            text-align: center;
            background-color: rgb(255, 0, 0);
            border: 5px solid rgb(0,0,0);
            color: rgb(255,255,255);
        }
    </style>
</head>
<body>
    <div>
        <h1>Hello-Word-1</h1>
    </div>
</body>
</html>
