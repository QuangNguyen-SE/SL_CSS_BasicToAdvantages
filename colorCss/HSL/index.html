<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HSL-Color</title>
    <style>
      /*
            HSL: là 1 bảng màu viết tắt cho 3 chữ
                1.Hue (Bảng màu hình tròn) 
                    0/360 : red
                    120 : green
                    240 : blue
                2.Saturation (độ đậm nhạt)

                3.Lightness (sáng tối) nếu chỉnh0% là sẽ tối đen
        */
      h1 {
        text-align: center;
        background-color: hsl(360, 100%, 50%);
        border: 5px solid rgb(0, 0, 0);
        color: rgb(255, 255, 255);
      }
    </style>
  </head>
  <body>
    <div>
      <h1>Hello-Word-1</h1>
    </div>
  </body>
</html>
