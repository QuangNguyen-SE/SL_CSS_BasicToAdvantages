<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Dành Cho Tay Lái</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Lớp nền có hiệu ứng chuyển động -->
    <div class="bg-animated"></div>

    <div class="login-wrapper">
        <!-- Form đăng nhập hiệu ứng kính mờ -->
        <div class="glass-form">
            <h2>Khởi Động</h2>
            <form>
                <div class="input-box">
                    <input type="text" required>
                    <label>Tên tay lái</label>
                </div>
                <div class="input-box">
                    <input type="password" required>
                    <label>Chìa khóa</label>
                </div>
                <button type="submit" class="rev-btn">Lên Ga</button>
            </form>
        </div>
    </div>
</body>

</html>
