<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single-Img</title>
    <style>
        html{
            height: 100vh;
            padding:0;
            margin: 0;
        }
        body{
            background-image: url("../../bg-pic.webp"); 
            color:white;
        }

    </style>
</head>
<body>
    <p>Let's decoration background body</p>
    <div>
        <p>Background-color</p>
        <select name="" id="choice">
            <option value="no-repeat">no-repeat</option>
            <option value="repeat">repeat</option>
        </select>
        <button onclick="myFunc()">Change</button>
    </div>
    <script>
        function myFunc(){
            let choice = document.getElementById("choice").value;
            document.body.style.backgroundRepeat=choice;
        }
    </script>
</body>
</html>
