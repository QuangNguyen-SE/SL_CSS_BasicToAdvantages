<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>padding</title>
    <style>
        /* Làm nút tắt quảng cáo bẩn tưởi */
        .box{
            background-color: wheat;
            height: 40px;
            width: 40px;
            font-size: large;
            border: 2px solid grey;
            border-radius: 50%;
            padding: 10px;
            text-align: justify;
            display: grid;
            place-items: center; 
            cursor: pointer;
        }

        .box a{
            padding: 2px;
            background-color:blue;
        }
    </style>
</head>
<body>
    <div class="box">
        <a href="https://www.youtube.com"></a>
    </div>
</body>
</html>
