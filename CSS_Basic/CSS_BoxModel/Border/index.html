<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS-Border</title>
    <link rel="icon" href="../FlexBox/picNumber/1.jpg"/>
    <style>
        html, body{
            height: 100%;
            position: relative;
        }
        .box{
            position: absolute;
            height: 50px;
            width: 50px;
            border: 5px solid;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="box">
        alo
    </div>
</body>
</html>
