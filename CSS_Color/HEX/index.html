<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEX-Color</title>
    <style>
        /*
            mã HEX: bắt đầu bằng #
            #RRGGBB (value: 0, 63-ff)
        */
        h1{
            text-align: center;
            background-color: #ff0000; /*Color nền*/
            border: 5px solid #000000; /*Color viền*/
            color: #ffffff; /*Color font-chữ*/
        }
    </style>
</head>
<body>
    <div>
        <h1>Hello-Word-1</h1>
    </div>
</body>
</html>
