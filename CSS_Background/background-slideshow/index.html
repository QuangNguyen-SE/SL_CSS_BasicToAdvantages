<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
        }

        body {
            width: 100%;
            height: 100%;
            background-image: url(pexels-eberhardgross-443446.jpg);
            background-size: cover auto;
            background-repeat: no-repeat;
            animation: slide 40s ease-in-out infinite;
            margin: 0;
        }

        @keyframes slide {
            0% {
                /* Bắt đầu nhìn từ bên trái */
                background-position: left center;
            }

            50% {
                /* Lia mắt sang tận cùng bên phải */
                background-position: right center;
            }

            100% {
                /* Lia mắt quay ngược lại về bên trái */
                background-position: left center;
            }
        }

        .box-modal {
            position: fixed;
            width: 500px;
            height: 500px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(224, 217, 217, 0.628);
            border: 1px solid auto;
            box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.299);
            border-radius: 20%;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .box-modal:hover {
            /* Kéo khối nhích lên trên 5px */

            /* Làm bóng đổ to ra, xa hơn và nhạt đi một chút để tạo cảm giác khối đang bay lên */
            box-shadow: 0px 15px 30px rgb(0, 0, 0);

            /* Khi tương tác, ta có thể tăng z-index để đảm bảo nó đè lên mọi thứ xung quanh */
            z-index: 20;
        }
        .box-modal{
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .box-modal h2 {
            text-align: center;
        }

        input{
            position: relative;
            top: 10%;
            width: 80%;
            height: auto;
            border: none;
            border-bottom: 2px solid;
            background-color: inherit;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="box-modal">
        <h2>Login Account</h2>
        <input id="email" type="Email" placeholder="Email">
        <label for="email">Email</label>
        <br>
        <input id="pass" type="password" placeholder="Password">
        <label for="pass">Password</label>
    </div>
</body>

</html>
