<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .btn-custom {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-custom:hover {
            background-color: #0056b3;
        }
        .btn-custom:focus,
        .input-custom:focus {
            outline: none;
        }

        .btn-custom:focus-visible {
            outline: 3px solid #ffc107;
            outline-offset: 2px;
        }

        .input-custom:focus-visible {
            outline: 2px solid #28a745;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div>
        <button class="btn-custom">Click bằng chuột, sau đó thử dùng phím Tab!</button>
        <input type="text" class="input-custom" placeholder="Nhập dữ liệu..." />
    </div>
</body>

</html>
