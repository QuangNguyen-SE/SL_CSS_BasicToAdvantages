<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First-Child</title>
    <style>
        .parent-1 p:first-child{
            background-color: antiquewhite;
        }
    </style>
</head>

<body>
    <p>Example of first-child</p>
    <hr>
    <div class="parent-1">
        <h3>Block</h3>
        <p>line-1</p>
        <p>line-2</p>
        <p>line-3</p>
    </div>
    <hr>
    <div class="parent-1">
        <p>line-1</p>
        <h3>Block</h3>
        <p>line-2</p>
        <p>line-3</p>
    </div>
</body>

</html>
