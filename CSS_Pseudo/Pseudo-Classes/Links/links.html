<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>:link</title>
    <style>
        a:link{
            color: red;
        }
        a:visited{
            color: burlywood;
        }
    </style>
</head>
<body>
    <a href="https://www.w3schools.com/css/css_pseudo_classes_interactive.asp?v123">This is a link</a>
    <br>
    <a href="https://www.w3schools.com/css/css_pseudo_classes_interactive.asp">This is a visited link</a>
    <p>
        Link phải đứng trc hover, bởi vì trong css thứ tự ưu tiên của link cao hơn hover, nên hover đứng sau link sẽ bị mất hiệu ứng
    </p>
</body>
</html>
