<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-class:Hover</title>
    <style>
        .box{
            height: 100px;
            width: 200px;
            border: 1px solid;
            background-color: red;
            text-align: center;
            color: white;
            font-size: 20px;
        }
        .box:hover{
            background-color: black;
        }
    </style>
</head>
<body>
    <div class="box">Move on me</div>
</body>
</html>
