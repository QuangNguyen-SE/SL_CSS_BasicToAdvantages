<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-Class:Focus</title>
    <style>
        body,
        html {
            height: 100%;
        }

        div {
            height: 50%;
        }

        #userInput {
            border: none;
            border-bottom: 2px solid black;
            background-color: antiquewhite;
            width: 10%;
            height: 10%;
        }

        #userInput:focus {
            border: none !important;
            outline: none !important;
            box-shadow: 8px 10px 10px 5px #000000;
            background-color: bisque;
        }
    </style>
</head>

<body>
    <div>
        Focus on this text box: <input type="text" id="userInput" placeholder="Text">
    </div>
</body>

</html>
