<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .overflow-scroll{
            border: 1px solid;
            width: 100px;
            height: 100px;
            overflow-y: scroll;
            overflow-x: hidden;
        }
        /* Trong thuộc tính overflow, mình có thể điều chỉnh độc lập
            Điều chỉnh overflow theo x-axis và y-axis
        */
    </style>
</head>
<body>
    <div class="overflow-scroll">
        <h2>scroll</h2>
        <p>My favor fruit</p>
        <ul>
            <li>Apple</li>
            <li>Grape</li>
            <li>Banana</li>
            <li>Guava</li>
            <li>Watermelon</li>
        </ul>
    </div>
</body>
</html>
