<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .overflow-visible{
            border: 1px solid;
            width: 100px;
            height: 100px;
            overflow-wrap: break-word;
        }
    </style>
</head>
<body>
    <div class="overflow-visible">
        <h2>Wrap</h2>
        <p>abcdxyzxyzxyzzzzzzzzzzzz</p>
    </div>
</body>
</html>
