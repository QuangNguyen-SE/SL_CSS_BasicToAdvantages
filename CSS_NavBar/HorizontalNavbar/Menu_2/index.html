<!DOCTYPE html>
<html lang="vi">

<head>

</head>

    <header>
        <nav class="navbar">
            <!-- Phần 1: Logo -->
            <div class="logo">MyLogo.</div>

            <!-- Phần 2: Các liên kết -->
            <ul class="nav-links">
                <li><a href="#home">Trang chủ</a></li>
                <li><a href="#products">Sản phẩm</a></li>

            <!-- Phần 3: Nút nhấn -->
            <a class="btn-contact" href="#contact">Liên hệ ngay</a>
        </nav>
    </header>

    <!-- Đoạn div này chỉ để tạo khoảng trống cho bạn cuộn trang -->
    <div style="height: 1500px; padding: 50px;">
        <h2>Nội dung trang web...</h2>
        <p>Thử cuộn trang xuống để xem menu được giữ cố định trên cùng nhé.</p>
