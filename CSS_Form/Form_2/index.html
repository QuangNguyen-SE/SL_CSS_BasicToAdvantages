<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h2>Form-title</h2>
        <form action="">
            <div class="input-group">
                <div class="glow-wrapper">
                    <svg class="glow-trail" viewBox="0 0 100 40" preserveAspectRatio="none" aria-hidden="true">
                        <rect class="glow-trail-path" x="2" y="2" width="96" height="36" rx="8" ry="8" pathLength="100">
                        </rect>
                    </svg>
                    <input type="text">
                </div>
                <label for="">First name</label>
            </div>
            <div class="input-group">
                <div class="glow-wrapper">
                    <svg class="glow-trail" viewBox="0 0 100 40" preserveAspectRatio="none" aria-hidden="true">
                        <rect class="glow-trail-path" x="2" y="2" width="96" height="36" rx="8" ry="8" pathLength="100">
                        </rect>
                    </svg>
                    <input type="text">
                </div>
                <label for="">Last name</label>
            </div>
            <div class="radio-group">
                <div class="radio-option">
                    <input type="radio">
                    <label for="">Male</label>
                </div>
                <div class="radio-option">
                    <input type="radio">
                    <label for="">Female</label>
                </div>
            </div>
        </form>
    </div>
</body>

</html>
