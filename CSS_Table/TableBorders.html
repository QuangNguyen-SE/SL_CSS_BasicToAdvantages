<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            width: 100%;
        }
    /* Table 1 đg kẻ thì dùng border collapse */
        /* table, tr, td, th{
            border-collapse: collapse;
            border: solid 1px;
        } */

    /* Table từng ô kẻ  */
        /* table, tr, td, th {
            border: solid 1px;
        } */

    /* Table theo từng hàng ngang */
        /* table{
            border: solid 1px;
            border-collapse: collapse;
        }
        th,td{
            border-bottom: solid 1px;
        } */

    /* Table ko viền bao bên ngoài và chỉ có đg kẻ hàng và cột bên trong */
        table{
            border-collapse: collapse;
            border-style: hidden;
        }
        th,td{
            border: 1px solid;
            outline-style: none;
        }
    </style>
</head>

<body>
    <div>
        <table>
            <tr>
                <th>First name</th>
                <th>Last name</th>
                <th>Age</th>
                <th>Salary</th>
            </tr>
            <tr>
                <td>Petter</td>
                <td>Griffin</td>
                <td>40</td>
                <td>200$</td>
            </tr>
            <tr>
                <td>Lois</td>
                <td>Griffin</td>
                <td>40</td>
                <td>0$</td>
            </tr>
            <tr>
                <td colspan="2">Nguyen Minh Quang</td>
                <td>40</td>
                <td>0$</td>
            </tr>
        </table>
    </div>
</body>
